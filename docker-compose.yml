version: "3.8"

services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-2025
    restart: unless-stopped
    ports:
      - "8888:8888"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
    # HEALTHCHECK buat auto-restart kalo mati
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1"
    networks:
      - portfolio-network

networks:
  portfolio-network:
    driver: bridge
