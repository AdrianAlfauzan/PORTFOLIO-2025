name: 🚀 Deploy to Domain

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: 📥 Install & Build
        run: |
          npm ci
          npm run build
          echo "✅ Build completed"

          # Cek output Next.js
          if [ -d ".next" ]; then
            echo "📁 Next.js build: .next/"
            ls -la .next/
          fi

      - name: 📤 Upload to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPSHOST }}
          username: ${{ secrets.VPSUSER }}
          password: ${{ secrets.VPSPASS }}
          source: |
            .next/
            public/
            package.json
            package-lock.json
          target: "/var/www/portfolio-2025"

      - name: 🚀 Restart Next.js on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPSHOST }}
          username: ${{ secrets.VPSUSER }}
          password: ${{ secrets.VPSPASS }}
          script: |
            echo "🚀 Restarting Next.js..."

            cd /var/www/portfolio-2025

            # Install dependencies
            npm ci --production

            # Install PM2 jika belum
            if ! command -v pm2 &> /dev/null; then
              npm install -g pm2
            fi

            # Stop process lama
            pm2 stop portfolio 2>/dev/null || true
            pm2 delete portfolio 2>/dev/null || true

            # Start Next.js di PORT 8888
            PORT=8888 pm2 start npm --name "portfolio" -- start

            # Save PM2
            pm2 save

            echo "✅ Next.js running on port 8888"
            echo "🌐 Domain: https://portfolio.domaicuan.my.id"
            echo "📊 Check: pm2 status"
