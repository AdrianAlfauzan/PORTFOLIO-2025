name: 🚀 Deploy Portfolio to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: 📥 Install Dependencies
        run: npm ci

      - name: 🔨 Build Next.js
        run: npm run build
        env:
          CI: false

      - name: 📤 Upload to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPSHOST }}
          username: ${{ secrets.VPSUSER }}
          password: ${{ secrets.VPSPASS }}
          source: |
            .next/
            public/
            package.json
            package-lock.json
            next.config.*
          target: "/root/PORTFOLIO-2025" # ✅ INI YANG BENAR!

      - name: 🚀 Restart Next.js
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPSHOST }}
          username: ${{ secrets.VPSUSER }}
          password: ${{ secrets.VPSPASS }}
          script: |
            echo "🚀 Starting deployment..."

            cd /root/PORTFOLIO-2025  # ✅ INI YANG BENAR!

            # Install dependencies
            npm ci --production

            # Install PM2 if needed
            if ! command -v pm2 &> /dev/null; then
              npm install -g pm2
            fi

            # Stop old process
            pm2 stop portfolio 2>/dev/null || true
            pm2 delete portfolio 2>/dev/null || true

            # Start Next.js on PORT 8888
            PORT=8888 pm2 start npm --name "portfolio" -- start

            # Save PM2
            pm2 save

            echo "✅ Deployment completed!"
            echo "🌐 Website: https://portfolio.domaicuan.my.id"
            echo "📊 Check: pm2 status"
