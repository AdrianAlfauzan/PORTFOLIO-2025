name: 🚀 Deploy Portfolio to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: 📥 Install Dependencies
        run: npm ci

      - name: 🔨 Build Next.js (DENGAN SUPABASE ENV)
        run: npm run build
        env:
          CI: false
          # 🔑 SUPABASE & ENV VARIABLES (WAJIB DITAMBAH!)
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_ADMIN_PASSWORD: ${{ secrets.NEXT_PUBLIC_ADMIN_PASSWORD }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: 📤 Upload to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPSHOST }}
          username: ${{ secrets.VPSUSER }}
          password: ${{ secrets.VPSPASS }}
          source: |
            .next/
            public/
            package.json
            package-lock.json
          target: "/root/PORTFOLIO-2025"

      - name: 🐳 Restart Docker Container (PAKAI INI!)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPSHOST }}
          username: ${{ secrets.VPSUSER }}
          password: ${{ secrets.VPSPASS }}
          script: |
            echo "🚀 Deploying with Docker..."

            cd /root/PORTFOLIO-2025

            # 🛑 HENTIKAN: Jangan pakai PM2/npm start lagi!
            # 🐳 PAKAI DOCKER SAJA (sudah jalan di container 'portfolio-2025')

            # 1. Stop container lama
            docker stop portfolio-2025 2>/dev/null || true
            docker rm portfolio-2025 2>/dev/null || true

            # 2. Build image baru dengan env variables
            docker build -t portfolio-app .

            # 3. Run container baru
            docker run -d \
              -p 8888:8888 \
              --name portfolio-2025 \
              --restart always \
              -e NEXT_PUBLIC_SUPABASE_URL="${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" \
              -e NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
              -e NEXT_PUBLIC_ADMIN_PASSWORD="${{ secrets.NEXT_PUBLIC_ADMIN_PASSWORD }}" \
              -e SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
              portfolio-app

            # 4. Cek status
            sleep 5
            docker ps
            echo "✅ Docker container restarted!"
            echo "🌐 https://portfolio.domaicuan.my.id"
