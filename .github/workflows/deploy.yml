name: 🚀 Deploy Portfolio to VPS

on:
  push:
    branches: [main]
  workflow_dispatch: # Untuk trigger manual

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: 📦 Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Node.js 22 (Next.js butuh ≥20)
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22" # PASTIKAN 22 atau 20
          cache: "npm"

      # 3. Install dependencies
      - name: 📥 Install Dependencies
        run: npm ci

      # 4. Build project (Next.js/React)
      - name: 🔨 Build Project
        run: |
          npm run build
          echo "✅ Build completed!"

          # Cek struktur build folder
          echo "📁 Build structure:"
          ls -la .next/ || ls -la build/ || echo "No build folder found"
        env:
          CI: false

      # 5. Deploy to VPS
      - name: 🚀 Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPSHOST }}
          username: ${{ secrets.VPSUSER }}
          password: ${{ secrets.VPSPASS }}
          script: |
            echo "=== 🚀 STARTING DEPLOYMENT ==="

            # 5.1 Update & Install Nginx
            echo "📦 Updating system..."
            apt update -y
            apt install nginx -y

            # 5.2 Create deployment directory
            echo "📁 Creating deployment folder..."
            DEPLOY_DIR="/var/www/portfolio"
            mkdir -p $DEPLOY_DIR

            # 5.3 Clean old files
            rm -rf $DEPLOY_DIR/*

            echo "✅ VPS ready for file upload..."

      # 6. Upload files to VPS
      - name: 📤 Upload Files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPSHOST }}
          username: ${{ secrets.VPSUSER }}
          password: ${{ secrets.VPSPASS }}
          source: |
            .next/standalone/**
            .next/static/**
            public/**
            package.json
          target: "/var/www/portfolio"
          strip_components: 0

      # 7. Configure Nginx & Start
      - name: 🔧 Configure Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPSHOST }}
          username: ${{ secrets.VPSUSER }}
          password: ${{ secrets.VPSPASS }}
          script: |
            echo "🔧 Configuring Nginx..."

            # 7.1 Create Nginx config
            cat > /etc/nginx/sites-available/portfolio << 'EOF'
            server {
                listen 80;
                server_name 72.61.215.194;
                root /var/www/portfolio;
                index index.html;
                
                # Gzip compression
                gzip on;
                gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
                
                # Security headers
                add_header X-Frame-Options "SAMEORIGIN" always;
                add_header X-Content-Type-Options "nosniff" always;
                add_header X-XSS-Protection "1; mode=block" always;
                
                # Cache static files
                location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
                    expires 1y;
                    add_header Cache-Control "public, immutable";
                }
                
                # Next.js static folder
                location /_next/static {
                    alias /var/www/portfolio/.next/static;
                    expires 365d;
                    add_header Cache-Control "public, immutable";
                }
                
                # Handle React Router / Next.js
                location / {
                    try_files $uri $uri/ /index.html;
                }
            }
            EOF

            # 7.2 Enable site
            ln -sf /etc/nginx/sites-available/portfolio /etc/nginx/sites-enabled/
            rm -f /etc/nginx/sites-enabled/default

            # 7.3 Set permissions
            chown -R www-data:www-data /var/www/portfolio
            chmod -R 755 /var/www/portfolio

            # 7.4 Test & restart
            nginx -t
            systemctl restart nginx

            echo "=== ✅ DEPLOYMENT COMPLETE ==="
            echo "🌐 Website: http://72.61.215.194"
            echo "🕐 Time: $(date)"
            echo "📊 Check status: systemctl status nginx"
