name: 🚀 Deploy Portfolio

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_ADMIN_PASSWORD: ${{ secrets.NEXT_PUBLIC_ADMIN_PASSWORD }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        with:
          host: ${{ secrets.VPSHOST }}
          username: ${{ secrets.VPSUSER }}
          password: ${{ secrets.VPSPASS }}
          # HAPUS script_timeout
          timeout: 1200 # 20 menit dalam detik
          script: |
            echo "🚀 Starting deployment..."
            cd /root/PORTFOLIO-2025

            echo "📥 Pulling latest code..."
            git fetch origin        
            git reset --hard origin/main

            echo "🧹 Cleaning old containers..."
            docker stop portfolio-2025 2>/dev/null || true
            docker rm portfolio-2025 2>/dev/null || true
            docker rmi portfolio-app 2>/dev/null || true

            echo "🏗️ Building Docker image..."
            docker build -t portfolio-app .

            echo "🚀 Running container..."
            docker run -dp 8888:8888 --name portfolio-2025 --restart always portfolio-app

            echo "✅ Deployment complete!"

            # Cek perubahan
            sleep 10
            echo "🔍 Testing deployment..."
            if curl -s http://localhost:8888 | grep -q "Adrian INI YANG BENAR"; then
              echo "🎉 Update berhasil!"
            else
              echo "⚠️  Perubahan belum terlihat."
            fi
