name: 🚀 Deploy Portfolio

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🐳 Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_ADMIN_PASSWORD: ${{ secrets.NEXT_PUBLIC_ADMIN_PASSWORD }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        with:
          host: ${{ secrets.VPSHOST }}
          username: ${{ secrets.VPSUSER }}
          password: ${{ secrets.VPSPASS }}
          script: |
            echo "🚀 Deploying new update..."
            cd /root/PORTFOLIO-2025

            # Pull latest code
            git pull origin main

            # Update .env.production
            cat > .env.production << EOF
            NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL
            NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY
            NEXT_PUBLIC_ADMIN_PASSWORD=$NEXT_PUBLIC_ADMIN_PASSWORD
            SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY
            EOF

            # Rebuild container DENGAN BUILD ARGS
            docker stop portfolio-2025 2>/dev/null || true
            docker rm portfolio-2025 2>/dev/null || true
            docker rmi portfolio-app 2>/dev/null || true

            # 🔧 TAMBAHKAN --build-arg DI SINI
            docker build -t portfolio-app --no-cache \
              --build-arg NEXT_PUBLIC_SUPABASE_URL="$NEXT_PUBLIC_SUPABASE_URL" \
              --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="$NEXT_PUBLIC_SUPABASE_ANON_KEY" \
              --build-arg NEXT_PUBLIC_ADMIN_PASSWORD="$NEXT_PUBLIC_ADMIN_PASSWORD" \
              --build-arg SUPABASE_SERVICE_ROLE_KEY="$SUPABASE_SERVICE_ROLE_KEY" \
              .

            docker run -dp 8888:8888 --name portfolio-2025 --restart always portfolio-app

            echo "✅ Deployed! https://portfolio.domaicuan.my.id"
            echo "📊 Container:"
            docker ps | grep portfolio
            echo "⏳ Waiting for app..."
            sleep 10
