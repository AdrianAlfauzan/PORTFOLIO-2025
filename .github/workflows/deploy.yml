name: 🚀 Deploy Portfolio

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: 📥 Install Dependencies
        run: npm ci

      - name: 🔨 Build Next.js (WITH DEBUG)
        run: |
          echo "🔧 Building with env variables..."
          echo "Supabase URL length: ${#NEXT_PUBLIC_SUPABASE_URL}"
          npm run build
          echo "📁 Build output structure:"
          find .next -type f -name "*.js" | head -5 || echo "No JS files in .next"
          ls -la .next/ || echo "No .next directory"
        env:
          CI: false
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_ADMIN_PASSWORD: ${{ secrets.NEXT_PUBLIC_ADMIN_PASSWORD }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: 📤 Upload ALL Files (FIX)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPSHOST }}
          username: ${{ secrets.VPSUSER }}
          password: ${{ secrets.VPSPASS }}
          source: "."
          target: "/root/PORTFOLIO-2025"
          overwrite: true
          rm: true

      - name: 🐳 Restart Docker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPSHOST }}
          username: ${{ secrets.VPSUSER }}
          password: ${{ secrets.VPSPASS }}
          script: |
            echo "🚀 Deploying..."
            cd /root/PORTFOLIO-2025

            # Cleanup old container & image
            docker stop portfolio-2025 2>/dev/null || true
            docker rm portfolio-2025 2>/dev/null || true
            docker rmi portfolio-app 2>/dev/null || true

            # Build with environment variables
            docker build -t portfolio-app . \
              --build-arg NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} \
              --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }} \
              --build-arg NEXT_PUBLIC_ADMIN_PASSWORD=${{ secrets.NEXT_PUBLIC_ADMIN_PASSWORD }} \
              --build-arg SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

            # Run with environment variables
            docker run -dp 8888:8888 \
              --name portfolio-2025 \
              --restart always \
              -e NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} \
              -e NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }} \
              -e NEXT_PUBLIC_ADMIN_PASSWORD=${{ secrets.NEXT_PUBLIC_ADMIN_PASSWORD }} \
              -e SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }} \
              portfolio-app

            echo "✅ Deployed! https://portfolio.domaicuan.my.id"

            # Verify deployment
            echo "📋 Checking container status..."
            sleep 5
            docker ps | grep portfolio-2025
            echo "📝 Last 10 lines of logs:"
            docker logs portfolio-2025 --tail 10
