name: 🚀 Deploy Portfolio

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_ADMIN_PASSWORD: ${{ secrets.NEXT_PUBLIC_ADMIN_PASSWORD }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: 📦 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: 📥 Install Dependencies
        run: npm ci

      - name: 🔨 Build Next.js
        run: |
          echo "🔧 Building with env variables..."
          npm run build

      - name: 📤 Upload Project Files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPSHOST }}
          username: ${{ secrets.VPSUSER }}
          password: ${{ secrets.VPSPASS }}
          source: "."
          target: "/root/PORTFOLIO-2025"
          overwrite: true
          rm: true

      - name: 🐳 Build & Run Docker Container on Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPSHOST }}
          username: ${{ secrets.VPSUSER }}
          password: ${{ secrets.VPSPASS }}
          script: |
            echo "🚀 Deploying..."
            cd /root/PORTFOLIO-2025

            # Create .env.production from GitHub Secrets
            cat > .env.production << 'EOF'
            NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL
            NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY
            NEXT_PUBLIC_ADMIN_PASSWORD=$NEXT_PUBLIC_ADMIN_PASSWORD
            SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY
            EOF

            # Stop and remove old container
            docker stop portfolio-2025 2>/dev/null || true
            docker rm portfolio-2025 2>/dev/null || true
            docker rmi portfolio-app 2>/dev/null || true

            # Build image from the UPLOADED files in the current directory
            docker build -t portfolio-app --no-cache .

            # Run the new container
            docker run -d \
              -p 8888:8888 \
              --name portfolio-2025 \
              --restart always \
              --env-file .env.production \
              portfolio-app

            echo "✅ Container deployed!"
            echo "📊 Status:"
            docker ps --filter "name=portfolio-2025"
            echo "⏳ Waiting for app to be ready..."
            sleep 15
            echo "🌐 Final test:"
            curl -f http://localhost:8888 && echo "Website is UP!" || echo "Website check failed"
