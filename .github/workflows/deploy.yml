name: 🚀 Deploy Portfolio

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🐳 Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_ADMIN_PASSWORD: ${{ secrets.NEXT_PUBLIC_ADMIN_PASSWORD }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        with:
          host: ${{ secrets.VPSHOST }}
          username: ${{ secrets.VPSUSER }}
          password: ${{ secrets.VPSPASS }}
          script: |
            echo "🚀 DEPLOYMENT STARTED"
            echo "====================="
            cd /root/PORTFOLIO-2025

            echo "1️⃣ Pulling latest code..."
            git pull origin main 2>/dev/null || echo "⚠️ Git pull skipped"

            echo "2️⃣ Cleaning old containers..."
            docker stop portfolio-2025 2>/dev/null || true
            docker rm portfolio-2025 2>/dev/null || true
            docker rmi portfolio-app 2>/dev/null || true

            echo "3️⃣ Building Docker image..."
            docker build -t portfolio-app --no-cache \
              --build-arg NEXT_PUBLIC_SUPABASE_URL="$NEXT_PUBLIC_SUPABASE_URL" \
              --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="$NEXT_PUBLIC_SUPABASE_ANON_KEY" \
              --build-arg NEXT_PUBLIC_ADMIN_PASSWORD="$NEXT_PUBLIC_ADMIN_PASSWORD" \
              --build-arg SUPABASE_SERVICE_ROLE_KEY="$SUPABASE_SERVICE_ROLE_KEY" \
              .

            echo "4️⃣ Starting container..."
            docker run -dp 8888:8888 --name portfolio-2025 --restart always portfolio-app

            echo "5️⃣ Waiting for startup..."
            sleep 5

            echo "✅ DEPLOYMENT COMPLETE!"
            echo "🌐 https://portfolio.domaicuan.my.id"

            echo ""
            echo "📊 Container Status:"
            docker ps

            echo ""
            echo "🔍 Health Check:"
            curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" http://localhost:8888 || echo "❌ Health check failed"
