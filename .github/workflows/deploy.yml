name: 🚀 Deploy Portfolio

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: 📥 Install Dependencies
        run: npm ci

      - name: 🔨 Build Next.js (WITH DEBUG)
        run: |
          echo "🔧 Building with env variables..."
          echo "Supabase URL length: ${#NEXT_PUBLIC_SUPABASE_URL}"
          npm run build
          echo "📁 Build output structure:"
          find .next -type f -name "*.js" | head -5 || echo "No JS files in .next"
          ls -la .next/ || echo "No .next directory"
        env:
          CI: false
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_ADMIN_PASSWORD: ${{ secrets.NEXT_PUBLIC_ADMIN_PASSWORD }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: 📤 Upload ALL Files (FIX)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPSHOST }}
          username: ${{ secrets.VPSUSER }}
          password: ${{ secrets.VPSPASS }}
          source: "."
          target: "/root/PORTFOLIO-2025"
          overwrite: true
          rm: true
          strip_components: 0

      - name: 🐳 Restart Docker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPSHOST }}
          username: ${{ secrets.VPSUSER }}
          password: ${{ secrets.VPSPASS }}
          script: |
            echo "🚀 Deploying..."
            cd /root

            # Hapus folder lama
            rm -rf PORTFOLIO-2025

            # Clone fresh dari GitHub
            git clone https://github.com/AdrianAlfauzan/PORTFOLIO-2025.git
            cd PORTFOLIO-2025

            # Buat .env.production
            cat > .env.production << EOF
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_ADMIN_PASSWORD=${{ secrets.NEXT_PUBLIC_ADMIN_PASSWORD }}
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            EOF

            # Hapus container & image lama
            docker stop portfolio-2025 2>/dev/null || true
            docker rm portfolio-2025 2>/dev/null || true
            docker rmi portfolio-app 2>/dev/null || true

            # Build dan run
            docker build -t portfolio-app --no-cache .
            docker run -dp 8888:8888 \
              --name portfolio-2025 \
              --restart always \
              portfolio-app

            echo "✅ Deployed! https://portfolio.domaicuan.my.id"
            echo "📊 Status:"
            docker ps | grep portfolio
            echo "🌐 Testing website:"
            curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" http://localhost:8888
